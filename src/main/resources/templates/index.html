<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{https://cdn.jsdelivr.net/npm/marked/marked.min.js}"></script>
    <script>
        const t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
    </script>
</head>
<body>

<div class="app-shell">

    <!-- Sidebar -->
    <aside class="folders-sidebar">
        <div class="sidebar-header">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Folders
        </div>

        <nav class="folder-nav">
            <a th:href="@{/}" class="folder-nav-item" th:classappend="${folderId == null} ? ' is-active' : ''">
                <span class="folder-label">
                    <svg class="folder-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>All Notes</span>
                </span>
            </a>
            <a th:href="@{/(folderId=0)}" class="folder-nav-item" th:classappend="${folderId != null and folderId == 0} ? ' is-active' : ''">
                <span class="folder-label">
                    <svg class="folder-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    <span>Uncategorized</span>
                </span>
            </a>
            <th:block th:each="f : ${folders}">
                <a th:href="@{/(folderId=${f.id})}" class="folder-nav-item" th:classappend="${folderId != null and folderId == f.id} ? ' is-active' : ''">
                    <span class="folder-label">
                        <svg class="folder-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        <span th:text="${f.name}">Folder</span>
                    </span>
                    <a th:href="@{/folders/delete/{id}(id=${f.id})}" class="folder-delete-btn"
                       th:title="'Delete ' + ${f.name}"
                       onclick="return confirm('Delete this folder? Notes will become Uncategorized.');">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </a>
                </a>
            </th:block>
        </nav>

        <div class="sidebar-footer">
            <form th:action="@{/folders}" method="post" class="folder-create-form">
                <input type="text" name="name" placeholder="New folder…" maxlength="120" class="folder-name-input">
                <button type="submit" class="btn-folder-add" title="Create folder">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </form>
        </div>
    </aside>

    <!-- Notes panel -->
    <div class="notes-panel">
        <div class="notes-topbar">
            <a href="/" class="app-title">
                Folio<span class="logo-dot"></span>
            </a>

            <form th:action="@{/}" method="get" class="search-form">
                <input type="hidden" name="folderId" th:if="${folderId != null}" th:value="${folderId}">
                <div class="search-input-wrapper">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Search notes…" class="search-input">
                </div>
                <button type="submit" style="display:none;">Search</button>
                <a th:if="${keyword != null and keyword != ''}" href="/" class="clear-search" title="Clear">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </a>
            </form>

            <div style="display:flex;gap:6px;align-items:center;margin-left:auto;">
                <button id="theme-toggle" class="btn-icon" title="Toggle theme">
                    <svg id="theme-icon-dark" style="display:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="theme-icon-light" style="display:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
                <a th:if="${folderId == null or folderId == 0}" href="/new" class="btn btn-primary">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Note
                </a>
                <a th:if="${folderId != null and folderId != 0}" th:href="@{/new(folderId=${folderId})}" class="btn btn-primary">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Note
                </a>
            </div>
        </div>

        <div class="notes-content">
            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(notes)}" class="empty-state">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" th:if="${keyword != null and keyword != ''}"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65" th:if="${keyword != null and keyword != ''}"/>
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" th:if="${keyword == null or keyword == ''}"/>
                    <polyline points="14 2 14 8 20 8" th:if="${keyword == null or keyword == ''}"/>
                </svg>
                <p th:if="${keyword != null and keyword != ''}">No notes matching "<strong th:text="${keyword}">…</strong>"</p>
                <p th:if="${keyword == null or keyword == ''}">No notes yet.</p>
                <div style="display:flex;gap:6px;">
                    <a th:if="${keyword != null and keyword != ''}" href="/" class="btn btn-outline">Clear</a>
                    <a th:if="${folderId == null or folderId == 0}" href="/new" class="btn btn-primary">Create note</a>
                    <a th:if="${folderId != null and folderId != 0}" th:href="@{/new(folderId=${folderId})}" class="btn btn-primary">Create note</a>
                </div>
            </div>

            <!-- Cards -->
            <ul th:if="${!#lists.isEmpty(notes)}" class="notes-grid">
                <li th:each="n : ${notes}">
                    <a th:href="@{/edit/{id}(id=${n.id})}" class="note-card-link"
                       th:styleappend="${n.accentColor != null} ? |border-left-color: ${n.accentColor}| : 'border-left-color: var(--border)'">
                        <div class="note-card-header">
                            <span class="note-title-row">
                                <strong th:text="${n.title}">Title</strong>
                            </span>
                            <span class="note-meta" th:text="${#temporals.format(n.updatedAt, 'dd MMM yyyy · HH:mm')}">date</span>
                        </div>
                        <div class="note-preview markdown-preview-target" th:text="${n.content}" style="display:none;"></div>
                        <div class="note-preview" th:id="'preview-' + ${n.id}"></div>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('theme-toggle');
    const iconDark = document.getElementById('theme-icon-dark');
    const iconLight = document.getElementById('theme-icon-light');
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    (cur === 'dark' ? iconLight : iconDark).style.display = 'block';
    btn.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const next = isDark ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        iconDark.style.display = isDark ? 'block' : 'none';
        iconLight.style.display = isDark ? 'none' : 'block';
    });

    document.querySelectorAll('.markdown-preview-target').forEach(function(el) {
        const out = document.getElementById(el.id ? el.id.replace('preview-target-', 'preview-') : null) || el.nextElementSibling;
        if (out) out.innerHTML = marked.parse(el.textContent || '');
    });
});
</script>
</body>
</html>
