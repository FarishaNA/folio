<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login — Folio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
        }
        .auth-logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }
        .auth-sub {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        .auth-field label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .auth-field input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .auth-field input:focus {
            border-color: var(--accent);
        }
        .auth-btn {
            width: 100%;
            padding: 0.65rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .auth-btn:hover { opacity: 0.9; }
        .auth-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .auth-footer a { color: var(--accent); text-decoration: none; }
        .auth-error {
            background: #ff444420;
            border: 1px solid #ff4444;
            color: #ff4444;
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-size: 0.82rem;
            margin-bottom: 1rem;
        }
        .auth-success {
            background: #22c55e20;
            border: 1px solid #22c55e;
            color: #22c55e;
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-size: 0.82rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">Folio</div>
        <div class="auth-sub">Sign in to your workspace</div>

        <div th:if="${param.error}" class="auth-error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="auth-success">Logged out successfully.</div>
        <div th:if="${param.registered}" class="auth-success">Account created — sign in below.</div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="auth-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autofocus required/>
            </div>
            <div class="auth-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required/>
            </div>
            <button type="submit" class="auth-btn">Sign in</button>
        </form>

        <div class="auth-footer">
            No account? <a th:href="@{/register}">Create one</a>
        </div>

        <div style="text-align:center;margin-top:1.5rem;display:flex;gap:1.5rem;justify-content:center;">
            <a th:href="@{/privacy}" style="font-size:0.72rem;color:var(--text-muted);text-decoration:none;">Privacy Policy</a>
            <a th:href="@{/tos}" style="font-size:0.72rem;color:var(--text-muted);text-decoration:none;">Terms of Service</a>
        </div>
    </div>
</div>
</body>
</html>
