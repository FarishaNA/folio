<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Profile — Folio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .profile-wrapper {
            max-width: 560px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
        }
        .profile-logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }
        .profile-back {
            font-size: 0.82rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .profile-back:hover { color: var(--text); }
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.75rem;
            margin-bottom: 1.25rem;
        }
        .section-title {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
        }
        .profile-username {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }
        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        .profile-field label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .profile-field input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
        }
        .profile-field input:focus { border-color: var(--accent); }
        .btn-primary {
            padding: 0.55rem 1.25rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-danger {
            padding: 0.55rem 1.25rem;
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-danger:hover { background: #ff444415; }
        .alert-success {
            background: #22c55e20;
            border: 1px solid #22c55e;
            color: #22c55e;
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-size: 0.82rem;
            margin-bottom: 1rem;
        }
        .alert-error {
            background: #ff444420;
            border: 1px solid #ff4444;
            color: #ff4444;
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-size: 0.82rem;
            margin-bottom: 1rem;
        }
        .danger-zone { border-color: #ff444440; }
        .danger-title { color: #ff4444; }
        .legal-links {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            justify-content: center;
        }
        .legal-links a {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .legal-links a:hover { color: var(--text); }
    </style>
</head>
<body>
<div class="profile-wrapper">
    <div class="profile-header">
        <a th:href="@{/}" class="profile-logo">Folio</a>
        <a th:href="@{/dashboard}" class="profile-back">← Back to dashboard</a>
    </div>

    <!-- Account info -->
    <div class="section-card">
        <div class="section-title">Account</div>
        <div class="profile-username" th:text="${username}"></div>
        <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.25rem;">Personal workspace</div>
    </div>

    <!-- Change password -->
    <div class="section-card">
        <div class="section-title">Change Password</div>
        <div th:if="${pwSuccess}" class="alert-success" th:text="${pwSuccess}"></div>
        <div th:if="${pwError}" class="alert-error" th:text="${pwError}"></div>
        <form th:action="@{/profile/change-password}" method="post">
            <div class="profile-field">
                <label>Current password</label>
                <input type="password" name="oldPassword" required/>
            </div>
            <div class="profile-field">
                <label>New password</label>
                <input type="password" name="newPassword" required/>
            </div>
            <div class="profile-field">
                <label>Confirm new password</label>
                <input type="password" name="confirmPassword" required/>
            </div>
            <button type="submit" class="btn-primary">Update password</button>
        </form>
    </div>

    <!-- Danger zone -->
    <div class="section-card danger-zone">
        <div class="section-title danger-title">Danger Zone</div>
        <div th:if="${deleteError}" class="alert-error" th:text="${deleteError}"></div>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;">
            Permanently deletes your account, all notes, and all folders. This cannot be undone.
        </p>
        <form th:action="@{/profile/delete-account}" method="post"
              onsubmit="return confirm('Delete your account permanently?')">
            <div class="profile-field">
                <label>Type your username to confirm</label>
                <input type="text" name="confirmUsername" placeholder="username" required/>
            </div>
            <button type="submit" class="btn-danger">Delete my account</button>
        </form>
    </div>

    <div class="legal-links">
        <a th:href="@{/privacy}">Privacy Policy</a>
        <a th:href="@{/tos}">Terms of Service</a>
    </div>
</div>
</body>
</html>
